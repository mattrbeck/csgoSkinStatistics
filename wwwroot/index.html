<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="CS2 Skin Stats is a website for determining information about a Counter-Strike 2 skin, including fade percentage, fire & ice, crimson kimono tier, and more." />
    <meta name="theme-color" content="#1F2D3A" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Skin Stats" />
    <meta property="og:title" content="Item Analyzer - Skin Stats" />
    <meta property="og:description" content="CS2 Skin Stats is a website for determining information about a Counter-Strike 2 skin, including fade percentage, fire & ice, crimson kimono tier, and more." />
    <meta property="og:url" content="https://skinstats.app/" />
    <meta property="og:image" content="https://skinstats.app/apple-touch-icon.png" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="styles.css" media="screen" />

    <!-- defer: don't block the first paint on these. The body (search box) renders immediately
         and the inline early-input shim below the form captures any paste+search that happens
         while these are still downloading on a slow connection. -->
    <script src="decals.js" type="text/javascript" defer></script>
    <script src="post.js" type="text/javascript" defer></script>

    <title>Item Analyzer - Skin Stats</title>
  </head>

  <body class="pre-search">
    <script>
      // A #hash deep-links straight to an item, so the page loads into content: skip the
      // empty-state hero (no centered search, no glide). Focus is skipped in post.js for the
      // same reason. Runs before the form is parsed, so there's no flash.
      if (location.hash) document.body.classList.remove("pre-search");
    </script>
    <noscript>
      <div style="height: 100vh; width: 100%; position: fixed">
        <p
          style="
            text-align: center;
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
          "
        >
          Please enable JavaScript.
        </p>
      </div>
    </noscript>

    <a
      href="https://github.com/mattrbeck/csgoSkinStatistics"
      class="github-corner"
      aria-label="View source on Github"
      ><svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
        <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
        <path
          d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
          fill="currentColor"
          style="transform-origin: 130px 106px"
          class="octo-arm"
        ></path>
        <path
          d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
          fill="currentColor"
          class="octo-body"
        ></path></svg></a
    ><style>
      .github-corner:hover .octo-arm {
        animation: octocat-wave 560ms ease-in-out;
      }
      @keyframes octocat-wave {
        0%,
        100% {
          transform: rotate(0);
        }
        20%,
        60% {
          transform: rotate(-25deg);
        }
        40%,
        80% {
          transform: rotate(10deg);
        }
      }
      @media (max-width: 500px) {
        .github-corner:hover .octo-arm {
          animation: none;
        }
        .github-corner .octo-arm {
          animation: octocat-wave 560ms ease-in-out;
        }
      }
    </style>

    <header id="site-header">
      <a class="wordmark" href="/">Skin Stats</a>
      <nav>
        <a href="/" class="current">Item</a>
        <a href="/inventory">Inventory</a>
      </nav>
    </header>

    <!-- .page-shift moves the search AND the results together for the pre-search hero glide. -->
    <div class="page-shift">
    <h1 class="sr-only">CS2 Skin Inspector</h1>

    <form id="input" name="input" method="post" autocomplete="off">
      <input
        type="text"
        id="textbox"
        name="id"
        placeholder="Inspect Link"
        onClick="this.select();"
        accesskey="n"
        title="Enter inspect link to search. Use Alt-N on Windows or Ctrl-Alt-N on Mac to focus on input."
      />
      <button id="button" type="button" aria-label="Search" title="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2.4" />
          <line x1="14.8" y1="14.8" x2="20.5" y2="20.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
        </svg>
      </button>
    </form>
    <script>
      // Early-input shim. The search box above is static markup that paints with the first
      // body render, but post.js (deferred) may still be downloading on a slow link. This inline
      // script — available the instant the form is parsed — captures a paste + Enter (or a click)
      // during that gap: it cancels the form's default POST reload and either runs the search
      // immediately (if post.js is already up) or queues it for post.js to replay on init. So a
      // user can land on the page, Ctrl-V, Enter, and never miss the search bar.
      (function () {
        var box = document.getElementById("textbox");
        var form = document.getElementById("input");
        var btn = document.getElementById("button");
        if (!box) return;
        if (!location.hash) box.focus({ preventScroll: true }); // hash = deep link, loads into content
        function go() {
          var v = box.value.trim();
          if (!v) return;
          if (window.__submitSearch) window.__submitSearch(v);
          else window.__pendingSearch = v; // not ready yet — post.js replays this on init
        }
        if (form) form.addEventListener("submit", function (e) { e.preventDefault(); go(); }); // Enter
        if (btn) btn.addEventListener("click", go);
        window.__shimReady = true;
      })();
    </script>

    <p class="search-hint">Paste a CS2 inspect link to see its float, pattern, stickers &amp; more.</p>

    <br />

    <!-- Searched items stack here, newest first; each is a clone of the template below. -->
    <div id="item-card-outer"></div>
    </div>

    <template id="item-card-template">
      <div class="item-card loading">
        <div class="card-image-frame">
          <img class="card-image" alt="" />
          <svg class="card-image-placeholder" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <circle cx="8.5" cy="10" r="1.6" fill="currentColor" />
            <path d="M5 17l4.5-4.5 3 3L16 12l3 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>

        <div class="card-body">
          <div class="card-name">Loading…</div>
          <div class="card-submessage"></div>

          <div class="card-line card-float-line">
            <span class="card-wear-pill"></span>
            <span class="card-float">-</span>
            <span class="card-float-bar-slot"></span>
          </div>

          <div class="card-line card-pattern-line">
            <span class="card-seed"><span class="card-muted card-help" title="Paint seed">Pattern</span> <span class="card-paintseed">-</span></span>
            <span class="card-rarity"></span>
          </div>

          <div class="item-stickers"></div>

          <dl class="card-meta">
            <div><dt>Wear</dt><dd class="card-wear">-</dd></div>
            <div><dt>Quality</dt><dd class="card-quality">-</dd></div>
            <div><dt>Origin</dt><dd class="card-origin">-</dd></div>
            <div><dt>ID</dt><dd class="card-itemid">-</dd></div>
          </dl>

          <div class="card-loadtime"></div>
        </div>

        <a class="card-inspect" href="#">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2.2" />
            <line x1="14.8" y1="14.8" x2="20.5" y2="20.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
          </svg>
          Inspect In Game
        </a>
      </div>
    </template>
  </body>
</html>
