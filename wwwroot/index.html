<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="CS2 Skin Stats is a website for determining information about a Counter-Strike 2 skin, including fade percentage, fire & ice, crimson kimono tier, and more." />
    <meta name="theme-color" content="#0E141D" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Skin Stats" />
    <meta property="og:title" content="Item Analyzer - Skin Stats" />
    <meta property="og:description" content="CS2 Skin Stats is a website for determining information about a Counter-Strike 2 skin, including fade percentage, fire & ice, crimson kimono tier, and more." />
    <meta property="og:url" content="https://skinstats.app/" />
    <meta property="og:image" content="https://skinstats.app/apple-touch-icon.png" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <!-- Critical CSS: just enough to paint the header + centered search bar + hint correctly,
         inlined so first paint needs only the HTML round-trip (not a second one for styles.css).
         The full stylesheet below loads async and refines/extends this; values here mirror it so
         there's no reflow when it applies. -->
    <style>
      :root{--gray:#151c27;--dark:#0e141d;--light:#2c3a4b;--pop:#2fe3a3;--text:#e9eef3}
      html{height:100%;font-size:16px}
      body{overflow-x:hidden;position:relative;min-height:100%;margin:0;font-family:Lato,sans-serif;color:var(--text);background:var(--gray)}
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
      a,a:visited{text-decoration:none;color:var(--text)}
      #site-header{display:flex;align-items:center;gap:22px;padding:13px 22px;margin-bottom:24px;background-color:var(--dark);border-bottom:1px solid var(--light)}
      .wordmark{display:inline-flex;align-items:center;gap:10px;font-family:'Rajdhani','Lato',sans-serif;font-size:23px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
      .wordmark .logo-mark{width:26px;height:26px;color:var(--pop);flex:none}
      .wordmark .wm-accent{color:var(--pop)}
      #site-header nav{display:flex;gap:20px}
      #site-header nav a{font-family:'Rajdhani','Lato',sans-serif;padding:4px 2px;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid transparent;opacity:.65}
      #site-header nav a.current{border-bottom-color:var(--pop);opacity:1}
      .gh-link{margin-left:auto;display:inline-flex;align-items:center;color:var(--text);opacity:.55}
      .gh-link svg{width:22px;height:22px}
      .page-shift{transition:transform .55s cubic-bezier(.22,1,.36,1)}
      body.pre-search .page-shift{transform:translateY(min(18vh,170px))}
      @media (prefers-reduced-motion:reduce){.page-shift,body.pre-search .page-shift{transition:none;transform:none}}
      .hero-lead{width:min(680px,100% - 32px);margin:0 auto 24px;text-align:center}
      .hero-eyebrow{display:block;font-family:'Rajdhani','Lato',sans-serif;font-size:14px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--pop)}
      .hero-title{margin:10px 0 12px;font-family:'Rajdhani','Lato',sans-serif;font-size:clamp(36px,7.5vw,58px);line-height:1;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
      .hero-sub{margin:0;font-size:16px;line-height:1.5;opacity:.6}
      body:not(.pre-search) .hero-lead{display:none}
      form{display:flex;align-items:center;width:min(608px,100% - 24px);margin:0 auto;padding:5px;box-sizing:border-box;background:var(--dark);border:1px solid var(--light);border-radius:999px}
      form:focus-within{border-color:var(--pop);box-shadow:0 0 0 3px rgb(47 227 163 / 18%)}
      form *{box-sizing:border-box}
      input{border:none;color:var(--text);font-family:Lato,sans-serif}
      input[type="text"]{flex:1;min-width:0;background:transparent;text-align:left;padding:0 16px;font-size:17px}
      input[type="text"]:focus{outline:none}
      #button{appearance:none;display:flex;align-items:center;justify-content:center;flex:0 0 40px;width:40px;height:40px;padding:0;border:none;border-radius:50%;background:var(--pop);color:var(--dark);cursor:pointer}
      #button:hover{background:#54f0b6}
      :focus-visible{outline:2px solid var(--pop);outline-offset:2px}
    </style>

    <!-- Load the full stylesheet + web font WITHOUT blocking first paint: media="print" keeps
         them off the screen render, and onload flips them to screen once fetched. <noscript>
         covers JS-disabled. The critical CSS above carries the above-the-fold render meanwhile. -->
    <link rel="stylesheet" href="styles.css" media="print" onload="this.media='screen'" />
    <noscript><link rel="stylesheet" href="styles.css" /></noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" media="print" onload="this.media='screen'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap"></noscript>

    <!-- defer: don't block the first paint on these. The body (search box) renders immediately
         and the inline early-input shim below the form captures any paste+search that happens
         while these are still downloading on a slow connection. -->
    <script src="decals.js" type="text/javascript" defer></script>
    <script src="app-shared.js" type="text/javascript" defer></script>
    <script src="post.js" type="text/javascript" defer></script>

    <title>Item Analyzer - Skin Stats</title>
  </head>

  <body class="pre-search">
    <script>
      // A #hash deep-links straight to an item, so the page loads into content: skip the
      // empty-state hero (no centered search, no glide). Focus is skipped in post.js for the
      // same reason. Runs before the form is parsed, so there's no flash.
      if (location.hash) document.body.classList.remove("pre-search");
    </script>
    <noscript>
      <div style="height: 100vh; width: 100%; position: fixed">
        <p
          style="
            text-align: center;
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
          "
        >
          Please enable JavaScript.
        </p>
      </div>
    </noscript>

    <header id="site-header">
      <a class="wordmark" href="/" aria-label="Skin Stats home">
        <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="11" fill="none" stroke="currentColor" stroke-width="2" opacity=".45" />
          <path d="M16 3.5v6M16 22.5v6M3.5 16h6M22.5 16h6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
          <circle cx="16" cy="16" r="3" fill="currentColor" />
        </svg>
        <span>Skin<span class="wm-accent">Stats</span></span>
      </a>
      <nav>
        <a href="/" class="current">Item</a>
        <a href="/inventory">Inventory</a>
      </nav>
      <a class="gh-link" href="https://github.com/mattrbeck/csgoSkinStatistics" target="_blank" rel="noopener" aria-label="View source on GitHub" title="View source on GitHub">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z" />
        </svg>
      </a>
    </header>

    <!-- .page-shift moves the search AND the results together for the pre-search hero glide. -->
    <div class="page-shift">
    <!-- The hero lead is the empty-state landing copy; it collapses once a search begins (the
         h1 carries the page's heading for assistive tech either way). -->
    <div class="hero-lead">
      <span class="hero-eyebrow">CS2 Skin Inspector</span>
      <h1 class="hero-title">Inspect any CS2 skin</h1>
      <p class="hero-sub">Float, pattern, fade %, fire &amp; ice, stickers &amp; more — decoded from a single inspect link, or browse a whole Steam inventory.</p>
    </div>

    <form id="input" name="input" method="post" autocomplete="off">
      <input
        type="text"
        id="textbox"
        name="id"
        placeholder="Inspect link or Steam profile"
        onClick="this.select();"
        accesskey="n"
        title="Paste a CS2 inspect link to analyze an item, or a Steam profile to browse an inventory. Use Alt-N on Windows or Ctrl-Alt-N on Mac to focus on input."
      />
      <button id="button" type="button" aria-label="Search" title="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2.4" />
          <line x1="14.8" y1="14.8" x2="20.5" y2="20.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
        </svg>
      </button>
    </form>
    <script>
      // Early-input shim. The search box above is static markup that paints with the first
      // body render, but post.js (deferred) may still be downloading on a slow link. This inline
      // script — available the instant the form is parsed — captures a paste + Enter (or a click)
      // during that gap: it cancels the form's default POST reload and either runs the search
      // immediately (if post.js is already up) or queues it for post.js to replay on init. So a
      // user can land on the page, Ctrl-V, Enter, and never miss the search bar.
      (function () {
        var box = document.getElementById("textbox");
        var form = document.getElementById("input");
        var btn = document.getElementById("button");
        if (!box) return;
        if (!location.hash) box.focus({ preventScroll: true }); // hash = deep link, loads into content
        function go() {
          var v = box.value.trim();
          if (!v) return;
          if (window.__submitSearch) window.__submitSearch(v);
          else window.__pendingSearch = v; // not ready yet — post.js replays this on init
        }
        if (form) form.addEventListener("submit", function (e) { e.preventDefault(); go(); }); // Enter
        if (btn) btn.addEventListener("click", go);
        window.__shimReady = true;
      })();
    </script>

    <!-- Recent lookups (items + profiles), filled from localStorage by app-shared.js after load.
         Hidden until there's something to show, and collapsed once a search begins. -->
    <div id="recent-searches" class="recent-searches" hidden></div>

    <br />

    <!-- Searched items stack here, newest first; each is a clone of the template below. -->
    <div id="item-card-outer"></div>
    </div>

    <template id="item-card-template">
      <div class="item-card loading">
        <div class="card-image-frame">
          <img class="card-image" alt="" />
          <svg class="card-image-placeholder" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6" />
            <circle cx="8.5" cy="10" r="1.6" fill="currentColor" />
            <path d="M5 17l4.5-4.5 3 3L16 12l3 3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>

        <div class="card-body">
          <div class="card-name">Loading…</div>
          <div class="card-submessage"></div>

          <div class="card-line card-float-line">
            <span class="card-wear-pill"></span>
            <span class="card-float">-</span>
            <span class="card-float-bar-slot"></span>
          </div>

          <div class="card-line card-pattern-line">
            <span class="card-seed"><span class="card-muted card-help" title="Paint seed">Pattern</span> <span class="card-paintseed">-</span></span>
            <span class="card-rarity"></span>
          </div>

          <div class="item-stickers"></div>

          <dl class="card-meta">
            <div><dt>Wear</dt><dd class="card-wear">-</dd></div>
            <div><dt>Quality</dt><dd class="card-quality">-</dd></div>
            <div><dt>Origin</dt><dd class="card-origin">-</dd></div>
            <div><dt>ID</dt><dd class="card-itemid">-</dd></div>
          </dl>

          <div class="card-loadtime"></div>
        </div>

        <a class="card-inspect" href="#">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2.2" />
            <line x1="14.8" y1="14.8" x2="20.5" y2="20.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
          </svg>
          Inspect In Game
        </a>
      </div>
    </template>
  </body>
</html>
