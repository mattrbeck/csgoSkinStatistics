<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Analyze Steam inventory for CS2 skins - get detailed information about all items including fade percentages, fire & ice, and more." />
    <meta name="theme-color" content="#1F2D3A" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Skin Stats" />
    <meta property="og:title" content="Inventory Analyzer - Skin Stats" />
    <meta property="og:description" content="Analyze Steam inventory for CS2 skins - get detailed information about all items including fade percentages, fire & ice, and more." />
    <meta property="og:url" content="https://skinstats.app/inventory" />
    <meta property="og:image" content="https://skinstats.app/apple-touch-icon.png" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <!-- Critical CSS: paint the header + centered search bar + hint after just the HTML
         round-trip (the hero is styled by styles.css, which inventory.css doesn't override).
         The full stylesheets load async below and refine the rest; values mirror them, no reflow. -->
    <style>
      :root{--gray:#1f2d3a;--dark:#0f1d2a;--light:#2f3d4a;--pop:#2ecc71;--text:#ecf0f1}
      html{height:100%;font-size:16px}
      body{overflow-x:hidden;position:relative;min-height:100%;margin:0;font-family:Lato,sans-serif;color:var(--text);background:var(--gray)}
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
      a,a:visited{text-decoration:none;color:var(--text)}
      #site-header{display:flex;align-items:center;gap:24px;padding:12px 20px;margin-bottom:20px;background-color:var(--dark)}
      #site-header .wordmark{font-size:20px;font-weight:bold}
      .page-shift{transition:transform .55s cubic-bezier(.22,1,.36,1)}
      body.pre-search .page-shift{transform:translateY(min(38vh,360px))}
      @media (prefers-reduced-motion:reduce){.page-shift,body.pre-search .page-shift{transition:none;transform:none}}
      form{display:flex;align-items:center;width:min(608px,100% - 24px);margin:0 auto;padding:5px;box-sizing:border-box;background:var(--dark);border:1px solid var(--light);border-radius:999px}
      form:focus-within{border-color:var(--pop);box-shadow:0 0 0 3px rgb(46 204 113 / 18%)}
      form *{box-sizing:border-box}
      input{border:none;color:var(--text);font-family:Lato,sans-serif}
      input[type="text"]{flex:1;min-width:0;background:transparent;text-align:left;padding:0 16px;font-size:17px}
      input[type="text"]:focus{outline:none}
      #button{appearance:none;display:flex;align-items:center;justify-content:center;flex:0 0 40px;width:40px;height:40px;padding:0;border:none;border-radius:50%;background:var(--light);color:var(--pop);cursor:pointer}
      #button:hover{background:var(--pop);color:var(--gray)}
      .search-hint{margin-top:12px;max-height:40px;color:var(--text);opacity:.5;font-size:14px;text-align:center}
      :focus-visible{outline:2px solid var(--pop);outline-offset:2px}
    </style>

    <!-- Load the full stylesheets + web font WITHOUT blocking first paint (media="print" +
         onload flip, <noscript> fallback). Critical CSS above carries the above-the-fold render. -->
    <link rel="stylesheet" href="styles.css" media="print" onload="this.media='screen'" />
    <link rel="stylesheet" href="inventory.css" media="print" onload="this.media='screen'" />
    <noscript>
      <link rel="stylesheet" href="styles.css" />
      <link rel="stylesheet" href="inventory.css" />
    </noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap" media="print" onload="this.media='screen'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap"></noscript>

    <!-- defer: keep the scripts off the render-blocking path; the inline early-input shim below
         the form captures a paste+analyze during the gap before these finish downloading. -->
    <script src="decals.js" type="text/javascript" defer></script>
    <script src="inventory-item.js" type="text/javascript" defer></script>
    <script src="inventory.js" type="text/javascript" defer></script>

    <title>Inventory Analyzer - Skin Stats</title>
  </head>

  <body class="pre-search">
    <script>
      // A #hash deep-links straight to an inventory, so the page loads into content: skip the
      // empty-state hero (no centered search, no glide). Focus is skipped in inventory.js for the
      // same reason. Runs before the form is parsed, so there's no flash.
      if (location.hash) document.body.classList.remove("pre-search");
    </script>
    <noscript>
      <div style="height: 100vh; width: 100%; position: fixed">
        <p
          style="
            text-align: center;
            position: relative;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
          "
        >
          Please enable JavaScript.
        </p>
      </div>
    </noscript>

    <header id="site-header">
      <a class="wordmark" href="/">Skin Stats</a>
    </header>

    <!-- .page-shift moves the search AND the results together for the pre-search hero glide. -->
    <div class="page-shift">
    <h1 class="sr-only">CS2 Inventory Analyzer</h1>

    <form id="input" name="input" method="post" autocomplete="off">
      <input
        type="text"
        id="textbox"
        name="steamid"
        placeholder="Steam Profile URL"
        onClick="this.select();"
        accesskey="n"
        title="Enter Steam profile URL or Steam ID to analyze their inventory. Use Alt-N on Windows or Ctrl-Alt-N on Mac to focus on input."
      />
      <button id="button" type="button" aria-label="Analyze" title="Analyze">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2.4" />
          <line x1="14.8" y1="14.8" x2="20.5" y2="20.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
        </svg>
      </button>
      <button id="cancel-button" type="button" aria-label="Cancel" title="Cancel" style="display: none;">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
          <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
        </svg>
      </button>
    </form>
    <script>
      // Early-input shim (see the item page for the full rationale). Available the instant the
      // form is parsed; captures a paste + Enter (cancelling the form's POST reload) or a button
      // click during the JS-download gap, and either analyzes immediately (if inventory.js is up)
      // or queues it for inventory.js to replay on init.
      (function () {
        var box = document.getElementById("textbox");
        var form = document.getElementById("input");
        var btn = document.getElementById("button");
        if (!box) return;
        if (!location.hash) box.focus({ preventScroll: true }); // hash = deep link, loads into content
        function go() {
          var v = box.value.trim();
          if (!v) return;
          if (window.__submitSearch) window.__submitSearch(v);
          else window.__pendingSearch = v; // not ready yet — inventory.js replays this on init
        }
        if (form) form.addEventListener("submit", function (e) { e.preventDefault(); go(); }); // Enter
        if (btn) btn.addEventListener("click", go);
        window.__shimReady = true;
      })();
    </script>

    <p class="search-hint">Paste a Steam profile URL or ID to analyze its CS2 inventory.</p>

    <div id="error-display" style="display: none;"></div>

    <div id="inventory-status" style="display: none;">
      <div id="loading-message">Loading inventory...</div>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <div id="progress-text">0 / 0 items analyzed</div>
    </div>

    <div id="inventory-summary" style="display: none;">
      <div class="summary-top">
        <a id="summary-profile" class="summary-profile" href="#" target="_blank" rel="noopener" style="display: none;">
          <img id="summary-avatar" class="summary-avatar" src="" alt="" style="display: none;">
          <span class="summary-nameblock">
            <span id="summary-persona" class="summary-persona"></span>
            <span id="summary-since" class="summary-since"></span>
          </span>
        </a>
        <div id="summary-highlights" class="summary-highlights"></div>
      </div>
      <div class="rarity-bar-container">
        <div id="rarity-bar" class="rarity-bar"></div>
        <div id="rarity-legend" class="rarity-legend"></div>
      </div>
      <div id="ban-alert" class="ban-alert" role="alert" style="display: none;"></div>
    </div>

    <div id="main-layout">
      <div id="sidebar" class="sidebar" style="display: none;">
        <div class="sidebar-content">
          <div class="sidebar-bar">
            <div class="control-group search-group">
              <input type="text" id="search-input" placeholder="Filter by name…" aria-label="Filter items by name" autocomplete="off">
            </div>
            <div class="sidebar-bar-row">
              <div class="sort-section">
                <div class="sort-controls">
                  <div class="control-group">
                    <label for="sort-select">Sort by:</label>
                    <select id="sort-select">
                      <option value="date">Date</option>
                      <option value="name">Name</option>
                      <option value="rarity" selected>Rarity</option>
                      <option value="float">Float</option>
                    </select>
                  </div>
                  <div class="control-group">
                    <label for="sort-order">Order:</label>
                    <select id="sort-order">
                      <option value="asc">Ascending</option>
                      <option value="desc" selected>Descending</option>
                    </select>
                  </div>
                </div>
              </div>
              <button type="button" class="filter-toggle" id="filter-toggle" aria-expanded="false" aria-controls="sidebar-sections">
                Filters <span class="filter-toggle-arrow" id="sidebar-arrow">▾</span>
              </button>
            </div>
          </div>

          <div class="sidebar-sections" id="sidebar-sections">
            <div class="sidebar-section">
            <h4>Filter Options</h4>
            <div class="control-group" role="group" aria-label="Item attributes">
              <div class="attr-chips">
                <button type="button" class="attr-chip" data-attr="star" aria-pressed="false" title="★ Knives &amp; Gloves only">★</button>
                <button type="button" class="attr-chip" data-attr="stattrak" aria-pressed="false" title="StatTrak™ only">StatTrak</button>
                <button type="button" class="attr-chip" data-attr="souvenir" aria-pressed="false" title="Souvenir only">Souvenir</button>
                <button type="button" class="attr-chip" data-attr="special" aria-pressed="false" title="Rare patterns only (fade %, fire &amp; ice, blue gem, …)">Rare Patterns</button>
              </div>
            </div>

            <div class="control-group" id="filter-type-group">
              <label for="filter-type">Type:</label>
              <select id="filter-type">
                <option value="">All Types</option>
              </select>
            </div>

            <div class="control-group">
              <label for="filter-rarity">Rarity:</label>
              <select id="filter-rarity">
                <option value="">All Rarities</option>
                <option value="Consumer Grade">Consumer Grade</option>
                <option value="Industrial Grade">Industrial Grade</option>
                <option value="Mil-Spec Grade">Mil-Spec Grade</option>
                <option value="Restricted">Restricted</option>
                <option value="Classified">Classified</option>
                <option value="Covert">Covert</option>
                <option value="Extraordinary">Extraordinary</option>
                <option value="Contraband">Contraband</option>
              </select>
            </div>
            
            <div class="control-group">
              <label for="filter-wear">Wear:</label>
              <select id="filter-wear">
                <option value="">All Wear Levels</option>
                <option value="Factory New">Factory New</option>
                <option value="Minimal Wear">Minimal Wear</option>
                <option value="Field-Tested">Field-Tested</option>
                <option value="Well-Worn">Well-Worn</option>
                <option value="Battle-Scarred">Battle-Scarred</option>
              </select>
            </div>
            
            <div class="control-group">
              <label for="filter-float-min">Float Range:</label>
              <div class="float-slider-container">
                <div class="float-slider-track">
                  <div class="float-slider-dim" id="float-slider-dim-left"></div>
                  <div class="float-slider-dim" id="float-slider-dim-right"></div>
                  <input type="range" id="float-slider-min" min="0" max="1" step="0.001" value="0" aria-label="Minimum float">
                  <input type="range" id="float-slider-max" min="0" max="1" step="0.001" value="1" aria-label="Maximum float">
                </div>
              </div>
              <div class="float-range">
                <input type="number" id="filter-float-min" step="0.001" min="0" max="1" placeholder="Min">
                <span>to</span>
                <input type="number" id="filter-float-max" step="0.001" min="0" max="1" placeholder="Max">
              </div>
            </div>
            
            <div class="control-group checkbox-group">
              <label for="hide-commemorative">
                <input type="checkbox" id="hide-commemorative" checked>
                Hide items without a float
              </label>
            </div>

            <button type="button" id="clear-filters" class="clear-filters">Clear filters</button>
          </div>
          </div>
        </div>
      </div>

      <div id="content-area" class="content-area">
        <div id="grid-status" class="grid-status" aria-live="polite"></div>
        <div id="inventory-container">
          <div id="inventory-grid"></div>
        </div>
      </div>
    </div>
    </div>

    <template id="inventory-item-template">
      <div class="item-content">
        <div class="item-left">
          <div class="item-image-container">
            <img class="item-image" data-field="image" src="" alt="Item image" loading="lazy">
          </div>
          <div class="item-actions">
            <a href="#" class="icon-btn" data-field="inspect-link" title="Inspect in game" aria-label="Inspect in game">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2.2"/>
                <line x1="14.8" y1="14.8" x2="20.5" y2="20.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </a>
            <a href="#" class="icon-btn" data-field="steam-link" title="View in Steam inventory" aria-label="View in Steam inventory" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13.5 4.5h6v6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M19.5 4.5l-8.5 8.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M9.5 6.5h-3a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-3" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </a>
          </div>
        </div>
        <div class="item-info">
          <div class="item-name" data-field="name"></div>
          <div class="item-details">
            <div class="detail-line" data-field="float-line">
              <span class="wear-pill" data-field="wear-pill" hidden></span>
              <span class="detail-label" data-field="float-label">Float:</span>
              <span class="detail-value loading-placeholder" data-field="float">Analyzing...</span>
              <span class="float-bar" data-field="float-bar" hidden>
                <span class="float-bar-dim" data-field="float-dim-left" hidden></span>
                <span class="float-bar-dim" data-field="float-dim-right" hidden></span>
                <span class="float-marker" data-field="float-marker"></span>
              </span>
            </div>
            <div class="detail-line" data-field="pattern-line">
              <span class="detail-label">Pattern:</span>
              <span class="detail-value loading-placeholder" data-field="pattern">Analyzing...</span>
              <span class="rarity-text" data-field="rarity"></span>
            </div>
          </div>
          <div class="item-stickers" data-field="stickers" hidden></div>
        </div>
      </div>
    </template>

    <div id="status-outer">
      <div id="status"></div>
    </div>
  </body>
</html>
